<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Right-click each image below and "Save image as..." to save the PNG icons:</p>
<h3>icon-192.png</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>icon-512.png</h3>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
    const ctx = canvas.getContext('2d');
    const s = canvas.width;
    const r = s * 0.1875;

    // Background
    const grad = ctx.createLinearGradient(0, 0, s, s);
    grad.addColorStop(0, '#0a1628');
    grad.addColorStop(1, '#1a3a6b');
    ctx.beginPath();
    ctx.roundRect(0, 0, s, s, r);
    ctx.fillStyle = grad;
    ctx.fill();

    // Gold circle
    const goldGrad = ctx.createLinearGradient(0, 0, s, s);
    goldGrad.addColorStop(0, '#d4af37');
    goldGrad.addColorStop(1, '#c5a44e');

    ctx.beginPath();
    ctx.arc(s/2, s*0.47, s*0.27, 0, Math.PI*2);
    ctx.strokeStyle = goldGrad;
    ctx.lineWidth = s*0.023;
    ctx.stroke();

    // Inner circle
    ctx.beginPath();
    ctx.arc(s/2, s*0.47, s*0.23, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(197, 164, 78, 0.5)';
    ctx.lineWidth = s*0.008;
    ctx.stroke();

    // CFA text
    ctx.fillStyle = '#c5a44e';
    ctx.font = `bold ${s*0.195}px Georgia, serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('CFA', s/2, s*0.47);

    // LEVEL I
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = `${s*0.055}px Inter, sans-serif`;
    ctx.fillText('LEVEL I', s/2, s*0.61);

    // TUTOR
    ctx.fillStyle = '#ffffff';
    ctx.font = `600 ${s*0.07}px Inter, sans-serif`;
    ctx.fillText('TUTOR', s/2, s*0.84);

    // Gold line
    ctx.beginPath();
    ctx.moveTo(s*0.34, s*0.87);
    ctx.lineTo(s*0.66, s*0.87);
    ctx.strokeStyle = 'rgba(197, 164, 78, 0.7)';
    ctx.lineWidth = s*0.006;
    ctx.stroke();
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

// Auto-download
function downloadCanvas(canvas, filename) {
    const link = document.createElement('a');
    link.download = filename;
    link.href = canvas.toDataURL('image/png');
    link.click();
}

setTimeout(() => {
    downloadCanvas(document.getElementById('c192'), 'icon-192.png');
    setTimeout(() => downloadCanvas(document.getElementById('c512'), 'icon-512.png'), 500);
}, 1000);
</script>
</body>
</html>
